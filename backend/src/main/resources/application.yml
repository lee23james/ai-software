server:
  port: 8080

spring:
  application:
    name: job-platform-backend
  datasource:
    # 小组统一使用 MySQL 8；库名 job_platform，不存在则自动创建（仅开发便利，生产请预先建库）
    # 启动前请确认：① MySQL 服务已启动 ② 账号密码正确
    url: jdbc:mysql://localhost:3306/job_platform?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${MYSQL_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:sql/schema-mysql.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

ai-service:
  base-url: http://localhost:8000
