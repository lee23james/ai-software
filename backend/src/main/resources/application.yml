server:
  port: 8080

spring:
  application:
    name: job-platform-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:job_platform;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

ai-service:
  base-url: http://localhost:8000

deepseek:
  base-url: https://api.deepseek.com
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-chat
  connect-timeout: 10s
  read-timeout: 120s
  max-job-description-chars: 500
  max-resume-text-chars: 12000

